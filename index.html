<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OmniScience Neural OS Pro+</title>
<link rel="stylesheet" href="styles/style.css" />
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/
all.min.css" />
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/mathjs@12.4.1/lib/browser/
math.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/
gsap.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/
katex.min.js"></script>
<script type="module" src="scripts/app.js"></script>
</head>
<body>
<div id="particles"></div>
<div class="app-shell">
<aside class="sidebar glass">
<div class="logo">⚛ OmniScience</div>
<button class="nav-btn active" data-view="dashboard">
<i class="fa-solid fa-chart-line"></i>
 Dashboard
</button>
<button class="nav-btn" data-view="chemistry">
<i class="fa-solid fa-flask"></i>
 Chemistry
</button>
<button class="nav-btn" data-view="math">
<i class="fa-solid fa-square-root-variable"></i>
 Mathematics
</button>
<button class="nav-btn" data-view="physics">
<i class="fa-solid fa-atom"></i>
 Physics
</button>
<button class="nav-btn" data-view="terminal">
<i class="fa-solid fa-terminal"></i>
 Neural Terminal
</button>
</aside>
<main class="workspace">
<section id="dashboard" class="view active glass">
<h1>OmniScience Neural OS Pro+</h1>
<div class="stats-grid">
<div class="stat-card glass">
<h3>CPU Simulation</h3>
<p id="cpuUsage">0%</p>
</div>
<div class="stat-card glass">
<h3>Memory</h3>
<p id="memoryUsage">0 MB</p>
2
</div>
<div class="stat-card glass">
<h3>Experiments</h3>
<p id="expCount">0</p>
</div>
</div>
</section>
<section id="chemistry" class="view glass">
<h2>Chemistry Laboratory</h2>
<div class="chem-controls">
<select id="element1"></select>
<select id="element2"></select>
<button id="mixBtn">Mix</button>
<button id="heatBtn">Heat</button>
</div>
<div class="lab-area">
<div class="beaker" id="beaker"></div>
</div>
<div id="reactionResult"></div>
</section>
<section id="math" class="view glass">
<h2>Mathematics Engine</h2>
<input id="mathInput" placeholder="x^2 - 4" />
<button id="solveBtn">Solve</button>
<button id="plotBtn">Plot</button>
<div id="mathOutput"></div>
<canvas id="chart"></canvas>
</section>
<section id="physics" class="view glass">
<h2>Physics Simulation</h2>
<input id="massInput" type="number" placeholder="Mass kg" />
<input id="forceInput" type="number" placeholder="Force N" />
<button id="simulatePhysics">Simulate</button>
<div id="physicsResult"></div>
<div class="physics-area">
<div class="physics-object" id="physicsObject"></div>
</div>
</section>

<section id="terminal" class="view glass">
<h2>Neural Terminal</h2>
<div id="terminalOutput"></div>
<div class="terminal-input-row">
<span>>></span>
<input id="terminalInput" autocomplete="off" />
</div>
</section>
</main>
</div>
</body>
</html>
